<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaGuard Lomé</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌊 SeaGuard Lomé</h1>

    <div class="container">

        <label>Hauteur des vagues (m)</label>
        <input type="number" id="vagues">

        <label>Niveau de marée (m)</label>
        <input type="number" id="maree">

        <label>Vitesse du vent (km/h)</label>
        <input type="number" id="vent">

        <button id="btn">
            Calculer le risque
        </button>

        <div id="resultat"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
